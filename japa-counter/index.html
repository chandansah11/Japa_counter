<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Japa Mala Counter</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

</head>

<body>

    <div class="particles"></div>

    <div class="container">

        <h1>📿 Japa Mala Counter</h1>

        <div id="timer">00:00</div>

        <div class="mala-wrapper" id="tapArea">
            <div id="malaCircle"></div>
            <div id="centerCount">0</div>
        </div>

        <div class="stats">

            <p>Total Count: <span id="total">0</span></p>
            <p>Mala Completed: <span id="mala">0</span></p>
            <p>🔥 Daily Streak: <span id="streak">0</span></p>

        </div>

        <div class="buttons">

            <button>Reset</button>
            <button>Dark Mode</button>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
